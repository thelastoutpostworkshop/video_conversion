name: Board request
description: Request support for a new board
title: "[Board request]: "
labels:
  - enhancement
  - board-request
body:
  - type: input
    id: board_name
    attributes:
      label: Board name
      placeholder: Waveshare ESP32-S3 1.85" Round Display
    validations:
      required: true

  - type: input
    id: board_url
    attributes:
      label: Board URL
      description: Link to the board product page, documentation, or reference page.
      placeholder: https://example.com/board
    validations:
      required: true

  - type: textarea
    id: board_details
    attributes:
      label: Board details
      description: Optional. Include screen resolution, shape, controller, or anything useful.
      placeholder: 240x240 round display, GC9A01, ESP32-S3

  - type: textarea
    id: reason
    attributes:
      label: Why should this board be added?
      placeholder: I use this board and would like a preset for it.
    validations:
      required: true
